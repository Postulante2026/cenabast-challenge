name: 'Continuous Delivery'

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 'Deploy to GCP Cloud Run'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker --quiet

      - name: Build and Push Docker Image
        run: |
          # Reemplaza 'cenabast-challenge' o ajusta el tag según los estándares de tu GCP
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/cenabast-api:${{ github.sha }} .
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/cenabast-api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy cenabast-api \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/cenabast-api:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated
